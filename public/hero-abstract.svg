<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="base" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#061220"/>
      <stop offset="100%" stop-color="#0f2642"/>
    </linearGradient>
    <radialGradient id="orb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e05d2e" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#e05d2e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#cc4a2a" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#cc4a2a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e3a5a" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#1e3a5a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e05d2e" stop-opacity="0"/>
      <stop offset="50%" stop-color="#e05d2e" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#e05d2e" stop-opacity="0"/>
    </linearGradient>
    <pattern id="dotGrid" width="80" height="80" patternUnits="userSpaceOnUse">
      <circle cx="40" cy="40" r="1" fill="#ffffff" opacity="0.04"/>
    </pattern>
  </defs>

  <!-- Base -->
  <rect width="1920" height="1080" fill="url(#base)"/>

  <!-- Accent orbs -->
  <circle cx="1680" cy="180" r="700" fill="url(#orb1)"/>
  <circle cx="240" cy="950" r="600" fill="url(#orb2)"/>
  <circle cx="960" cy="580" r="800" fill="url(#orb3)"/>

  <!-- Flowing lines -->
  <path d="M0,620 Q400,280 960,560 T1920,420" fill="none" stroke="url(#lineGrad)" stroke-width="2"/>
  <path d="M0,680 Q420,340 960,620 T1920,480" fill="none" stroke="url(#lineGrad)" stroke-width="1.5" opacity="0.6"/>
  <path d="M0,560 Q460,240 960,500 T1920,360" fill="none" stroke="url(#lineGrad)" stroke-width="1" opacity="0.4"/>

  <!-- Geometric accents -->
  <g opacity="0.08">
    <polygon points="1750,120 1800,80 1850,120 1800,160" fill="#e05d2e"/>
    <polygon points="180,820 230,780 280,820 230,860" fill="#cc4a2a"/>
    <polygon points="1600,900 1640,870 1680,900 1640,930" fill="#eb7d4d"/>
  </g>

  <!-- Soft arcs -->
  <path d="M-100,1080 A500,500 0 0,1 400,580" fill="none" stroke="#e05d2e" stroke-width="60" opacity="0.06"/>
  <path d="M2020,0 A600,600 0 0,0 1420,600" fill="none" stroke="#cc4a2a" stroke-width="80" opacity="0.05"/>

  <!-- Dot grid overlay -->
  <rect width="1920" height="1080" fill="url(#dotGrid)"/>
</svg>
